name: KernelMind CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil fastapi uvicorn httpx pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: Ethics lock must pass
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from ethics.lock import EthicsLock, ActionType
          lock = EthicsLock(confirmation_fn=lambda _: True)
          assert lock.evaluate(ActionType.NETWORK, 'ci test').allowed == False, 'NETWORK must always be blocked'
          assert lock.evaluate(ActionType.READ, 'ci test').allowed == True
          print('EthicsLock integrity: PASS')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --ignore E501 || true

  mcp-test:
    name: MCP Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install psutil fastapi uvicorn
      - name: Test MCP tools
        run: |
          python3 mcp/tool.py --test
