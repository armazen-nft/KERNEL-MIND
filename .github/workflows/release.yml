name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Test built wheel metadata
        run: python -m pip install dist/*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KernelMind ${{ github.ref_name }}
          body: |
            ## KernelMind ${{ github.ref_name }}

            IA leve e ética para observação de kernel.

            ### Instalação
            ```bash
            python -m pip install dist/*.whl
            ```

            ### Componentes
            - KernelSense — leitura real de métricas
            - MemoryWeaver — sugestões de RAM
            - StorageGuard — sugestões de disco
            - ThreatRadar — detecção de anomalias
            - EthicsLock — política e auditoria
            - API REST (FastAPI, porta 7771)
            - CLI (`km`)
            - MCP Server (PoE namespace)
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
