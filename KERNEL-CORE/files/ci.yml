name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -v --tb=short --cov=kernelmind --cov-report=term-missing

      - name: EthicsLock integrity check
        run: |
          python -c "
          from kernelmind.ethics.lock import EthicsLock, ActionType
          lock = EthicsLock(confirmation_fn=lambda _: True)
          assert not lock.evaluate(ActionType.NETWORK, 'ci').allowed, 'NETWORK must be blocked'
          assert lock.evaluate(ActionType.READ, 'ci').allowed, 'READ must be allowed'
          print('EthicsLock integrity: PASS')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check kernelmind/ tests/

  mcp:
    name: MCP Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m kernelmind.mcp.tool --test
